{% extends "layout.html" %}

{% block title %}
Register
{% endblock %}

{% block content %}
<style>
    .errorlist {
        color: #ff4d4d;
        font-weight: bold;
        background-color: rgba(255,0,0,0.1);
        padding: 10px;
        border-radius: 5px;
    }
</style>
<div class="form-container">
    <h2>Create an Account</h2>
    <form method="post" class="form">
        {% csrf_token %}
        <div class="form-group mb-4">
            {{ form.as_p }}
        </div>
        <button class="btn btn-primary-custom w-100" type="submit">Register</button>
    </form>
    <p class="text-center text-muted mt-3">
        Already have an account? <a href="{% url 'login' %}" class="text-primary text-decoration-none" style="color: var(--primary-color) !important;">Login here</a>
    </p>
</div>
{% endblock %}
