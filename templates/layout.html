{% load static %}
<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <title>
        {% block title %}
        Chai aur Django
        {% endblock %}
    </title>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark custom-navbar sticky-top">
      <div class="container-fluid px-4">
        <a class="navbar-brand" href="{% url 'index' %}">Tweetbar</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="{% url 'index' %}">Home</a>
            </li>
          </ul>
          <form class="d-flex me-3" role="search">
            <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" style="background-color: rgba(255,255,255,0.05); color: white; border: 1px solid var(--border-color);">
            <button class="btn btn-outline-custom" type="submit">Search</button>
          </form>
          <div class="d-flex align-items-center gap-2">
            <a href="{% url 'tweet_list' %}" class="btn btn-primary-custom">Tweet Home</a>
            {% if user.is_authenticated %}
            <form method="post" action="{% url 'logout' %}" class="m-0">
              {% csrf_token %}
              <button class="btn btn-outline-danger" type="submit">Logout</button>
            </form>
            {% else %}
            <a href="{% url 'login' %}" class="btn btn-outline-custom">Login</a>
            <a href="{% url 'register' %}" class="btn btn-primary-custom">Sign up</a>
            {% endif %}
          </div>
        </div>
      </div>
    </nav>

    <div class="container mt-4">
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmxc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
