{% extends "layout.html"%}

{%block title%}
Chai aur tweet
{%endblock %}

{% block content %}
<div class="form-container">
    <h2>
        {% if form.instance.pk %}
        Edit Tweet
        {% else %}
        Create a New Tweet
        {% endif %}
    </h2>
    <form method="post" enctype="multipart/form-data" class="form">
       {% csrf_token %}
        <div class="form-group mb-4">
            {{form.as_p}}
        </div>
        <div class="d-flex gap-3 justify-content-center">
            <button class="btn btn-primary-custom w-50" type="submit">Submit</button>
            <a href="{% url 'tweet_list' %}" class="btn btn-outline-custom w-50 text-center text-decoration-none">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
