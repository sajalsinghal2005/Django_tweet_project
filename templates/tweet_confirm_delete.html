{% extends "layout.html"%}

{%block title%}
Chai aur tweet
{%endblock %}

{% block content %}
<div class="form-container text-center">
    <h3 class="mb-4 text-white">Are you sure you want to delete this tweet?</h3>
    <p class="text-muted mb-4">This action cannot be undone.</p>
    <form method="post" class="d-flex gap-3 justify-content-center">
        {% csrf_token %}
        <button class="btn btn-danger w-50" type="submit">Delete</button>
        <a class="btn btn-outline-custom w-50" href="{% url 'tweet_list' %}">Cancel</a>
    </form>
</div>
{% endblock %}
